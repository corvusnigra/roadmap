name: CI

# Прогоняется на каждый PR и push в main. Не блокирует деплой —
# деплой блокируется branch protection rule "Require status checks
# to pass before merging" (его настраивает владелец репо в GitHub UI).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Content validator
        # Статическая проверка MDX без БД — гарантирует, что все frontmatter
        # валидны, prereq slugs резолвятся, и в published-узлах нет TODO.
        run: pnpm content:check
